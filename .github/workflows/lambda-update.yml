name: Update Lambda Function 

on:
  push:
    paths:
      - 'terraform/app/**'
      - '.github/workflows/lambda-update.yml'
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  update-lambda:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository
      - name: Checkout Repo
        uses: actions/checkout@v4

      # 2. Configure AWS Credentials using OIDC
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::590183969845:role/github-assume-role
          role-session-name: lambda-update-session
          aws-region: us-east-1

      # 3. Retrieve the dynamic ECR Repository URI and set it as an environment variable
      - name: Get ECR Repository URI
        id: ecr_repo
        run: |
          REPO_URI=$(aws ecr describe-repositories --repository-names lambda-hello-world --region us-east-1 --query "repositories[0].repositoryUri" --output text)
          echo "ECR_REPO_URI=$REPO_URI" >> $GITHUB_ENV
          echo "Repository URI: $REPO_URI"

      # 4. Update the Lambda function with the new container image
      - name: Update Lambda Function Code
        run: |
          aws lambda update-function-code \
            --function-name hello-lambda \
            --image-uri "${{ env.ECR_REPO_URI }}:latest"
