name: App & Infra Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]
      project_name:
        description: 'Name of the ECR repository'
        required: true
        default: 'lambda-hello-world'
        type: string
      image_tag:
        description: 'Docker image tag (leave empty for auto-generated)'
        required: false
        default: ''
        type: string
      skip_build:
        description: 'Skip Docker build'
        required: false
        default: false
        type: boolean

env:
  AWS_REGION: ap-south-1
  AWS_ROLE_ARN: 'arn:aws:iam::436450225331:role/oidc-assume-role'

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  terraform-plan-ecr:
    name: Ensure ECR Repository
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init (ECR)
        working-directory: terraform/modules/ecr
        run: terraform init

      - name: Import ECR if exists
        working-directory: terraform/modules/ecr
        run: |
          aws ecr describe-repositories --repository-names ${{ github.event.inputs.project_name }} \
          && terraform import aws_ecr_repository.this ${{ github.event.inputs.project_name }} || echo "ECR does not exist or already imported"

      - name: Terraform Apply (ECR)
        working-directory: terraform/modules/ecr
        run: terraform apply -auto-approve \
          -var="project_name=${{ github.event.inputs.project_name }}" \
          -var="environment=${{ github.event.inputs.environment }}" \
          -var="region=${{ env.AWS_REGION }}"

      - name: Extract ECR URL
        id: ecr-uri
        working-directory: terraform/modules/ecr
        run: |
          URI=$(terraform output -raw repository_uri)
          echo "ecr_uri=$URI" >> $GITHUB_OUTPUT

    outputs:
      ecr_uri: ${{ steps.ecr-uri.outputs.ecr_uri }}

  docker-build-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: terraform-plan-ecr
    if: github.event.inputs.skip_build != 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: generate-tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            TAG=${{ github.event.inputs.image_tag }}
          else
            TAG="v1-${{ github.run_number }}"
          fi
          echo "image_tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build and push image
        run: |
          docker build -t ${{ needs.terraform-plan-ecr.outputs.ecr_uri }}:${{ steps.generate-tag.outputs.image_tag }} terraform/app
          docker push ${{ needs.terraform-plan-ecr.outputs.ecr_uri }}:${{ steps.generate-tag.outputs.image_tag }}

    outputs:
      image_uri: ${{ needs.terraform-plan-ecr.outputs.ecr_uri }}:${{ steps.generate-tag.outputs.image_tag }}
      image_tag: ${{ steps.generate-tag.outputs.image_tag }}

  deploy-infrastructure:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: docker-build-push
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init (env)
        working-directory: terraform/envs/${{ github.event.inputs.environment }}
        run: terraform init

      - name: Terraform Apply (env)
        working-directory: terraform/envs/${{ github.event.inputs.environment }}
        run: terraform apply -auto-approve \
          -var="aws_region=${{ env.AWS_REGION }}" \
          -var="environment=${{ github.event.inputs.environment }}" \
          -var="project_name=${{ github.event.inputs.project_name }}" \
          -var="image_uri=${{ needs.docker-build-push.outputs.image_uri }}"
