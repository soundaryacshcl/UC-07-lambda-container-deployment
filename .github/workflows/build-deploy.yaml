name: App & Infra Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]
      project_name:
        description: 'ECR repository name'
        required: true
        default: 'lambda-hello-world'
        type: string
      image_tag:
        description: 'Docker image tag (leave empty for auto-generated)'
        required: false
        default: ''
        type: string
      skip_build:
        description: 'Skip Docker build'
        required: false
        default: false
        type: boolean

env:
  AWS_REGION: ap-south-1
  AWS_ROLE_ARN: 'arn:aws:iam::436450225331:role/oidc-assume-role'
  AWS_DEFAULT_REGION: ap-south-1

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  ecr:
    name: Ensure ECR Repository
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    outputs:
      ecr_uri: ${{ steps.ecr_uri.outputs.ecr_uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init
        working-directory: terraform/modules/ecr
        run: terraform init

      - name: Terraform Import ECR (if exists)
        working-directory: terraform/modules/ecr
        run: |
          aws ecr describe-repositories --repository-names ${{ github.event.inputs.project_name }} \
          && terraform import aws_ecr_repository.this ${{ github.event.inputs.project_name }} || echo "ECR not found, skipping import"

      - name: Terraform Apply (ECR)
        working-directory: terraform/modules/ecr
        run: |
          terraform apply -auto-approve \
            -var="project_name=${{ github.event.inputs.project_name }}" \
            -var="environment=${{ github.event.inputs.environment }}" \
            -var="aws_region=${{ env.AWS_REGION }}"

      - name: Output ECR URI
        id: ecr_uri
        working-directory: terraform/modules/ecr
        run: |
          ECR_URI=$(terraform output -raw repository_uri)
          echo "ecr_uri=$ECR_URI" >> $GITHUB_OUTPUT

  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [ecr]
    if: github.event.inputs.skip_build != 'true'
    outputs:
      image_uri: ${{ needs.ecr.outputs.ecr_uri }}:${{ steps.gen_tag.outputs.image_tag }}
      image_tag: ${{ steps.gen_tag.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate Tag
        id: gen_tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "image_tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            TAG="v1-${{ github.run_number }}"
            echo "image_tag=$TAG" >> $GITHUB_OUTPUT
          fi

      - name: Build and Push Image
        run: |
          docker build -t ${{ needs.ecr.outputs.ecr_uri }}:${{ steps.gen_tag.outputs.image_tag }} terraform/app
          docker push ${{ needs.ecr.outputs.ecr_uri }}:${{ steps.gen_tag.outputs.image_tag }}

  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: [build, ecr]
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init (Root)
        working-directory: terraform/envs/${{ github.event.inputs.environment }}
        run: terraform init

      - name: Terraform Import IAM Role (if exists)
        working-directory: terraform/envs/${{ github.event.inputs.environment }}
        run: |
          aws iam get-role --role-name lambda_exec_role-${{ github.event.inputs.environment }} \
          && terraform import module.iam.aws_iam_role.lambda_exec_role lambda_exec_role-${{ github.event.inputs.environment }} || echo "IAM role not found, skipping import"

      - name: Terraform Apply (Infra)
        working-directory: terraform/envs/${{ github.event.inputs.environment }}
        run: |
          terraform apply -auto-approve \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="project_name=${{ github.event.inputs.project_name }}" \
            -var="environment=${{ github.event.inputs.environment }}" \
            -var="image_uri=${{ needs.build.outputs.image_uri }}"

      - name: Output API and Lambda Info
        working-directory: terraform/envs/${{ github.event.inputs.environment }}
        run: |
          echo "API: $(terraform output -raw api_endpoint 2>/dev/null || echo NotFound)"
          echo "Lambda: $(terraform output -raw lambda_function_name 2>/dev/null || echo NotFound)"
