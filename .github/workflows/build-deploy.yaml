name: App & Infra Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]
      image_tag:
        description: 'Docker image tag (leave empty for auto-generated)'
        required: false
        default: ''
        type: string
      skip_build:
        description: 'Skip Docker build (use existing image)'
        required: false
        default: false
        type: boolean

env:
  AWS_REGION: ap-south-1
  AWS_ROLE_ARN: 'arn:aws:iam::436450225331:role/oidc-assume-role'

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  ecr:
    name: Ensure ECR Repository
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    outputs:
      ecr_uri: ${{ steps.set-ecr-uri.outputs.ecr_uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set repo name
        id: repo-name
        run: echo "repo_name=lambda-hello-world" >> $GITHUB_OUTPUT

      - name: Check if ECR repo exists
        id: check-ecr
        run: |
          EXISTS=$(aws ecr describe-repositories --repository-names "${{ steps.repo-name.outputs.repo_name }}" --region $AWS_REGION 2>/dev/null || echo "not-found")
          if echo "$EXISTS" | grep -q '"repositoryArn"'; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Terraform
        if: steps.check-ecr.outputs.exists == 'false'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.0

      - name: Terraform Init - ECR Module
        if: steps.check-ecr.outputs.exists == 'false'
        working-directory: terraform/modules/ecr
        run: terraform init

      - name: Terraform Apply - Create ECR Repo
        if: steps.check-ecr.outputs.exists == 'false'
        working-directory: terraform/modules/ecr
        run: |
          terraform apply -auto-approve \
            -var="project_name=${{ steps.repo-name.outputs.repo_name }}" \
            -var="environment=${{ github.event.inputs.environment }}" \
            -var="region=${{ env.AWS_REGION }}"

      - name: Set ECR URI output
        id: set-ecr-uri
        run: |
          ECR_URI=$(aws ecr describe-repositories \
            --repository-names "${{ steps.repo-name.outputs.repo_name }}" \
            --region $AWS_REGION \
            --query 'repositories[0].repositoryUri' --output text)
          echo "ecr_uri=$ECR_URI" >> $GITHUB_OUTPUT

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [ecr]
    environment: ${{ github.event.inputs.environment }}
    if: github.event.inputs.skip_build != 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate unique image tag
        id: generate-tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          else
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            SHORT_SHA=${GITHUB_SHA:0:7}
            IMAGE_TAG="v1.12.0-${TIMESTAMP}-${SHORT_SHA}"
          fi
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          docker build -t ${{ needs.ecr.outputs.ecr_uri }}:${{ steps.generate-tag.outputs.image_tag }} terraform/app
          docker push ${{ needs.ecr.outputs.ecr_uri }}:${{ steps.generate-tag.outputs.image_tag }}

    outputs:
      image_uri: ${{ needs.ecr.outputs.ecr_uri }}:${{ steps.generate-tag.outputs.image_tag }}
      image_tag: ${{ steps.generate-tag.outputs.image_tag }}

  deploy-infrastructure:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.0

      - name: Terraform Init
        working-directory: terraform/envs/${{ github.event.inputs.environment }}
        run: terraform init

      - name: Terraform Apply
        timeout-minutes: 5
        working-directory: terraform/envs/${{ github.event.inputs.environment }}
        run: |
          terraform apply -auto-approve -input=false -no-color -parallelism=1 -lock=false \
          -var="aws_region=${{ env.AWS_REGION }}" \
          -var="image_uri=${{ needs.build-and-push.outputs.image_uri }}" \
          -var="project_name=lambda-hello-world"


      - name: Capture Outputs
        id: tfoutputs
        working-directory: terraform/envs/${{ github.event.inputs.environment }}
        run: |
          API_URL=$(terraform output -raw api_gateway_url 2>/dev/null || echo "")
          FUNCTION_URL=$(terraform output -raw lambda_function_url 2>/dev/null || echo "")
          LAMBDA_ARN=$(terraform output -raw lambda_function_arn 2>/dev/null || echo "")
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
          echo "function_url=$FUNCTION_URL" >> $GITHUB_OUTPUT
          echo "lambda_arn=$LAMBDA_ARN" >> $GITHUB_OUTPUT
