name: Build, Push Docker & Deploy Lambda

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::590183969845:role/github-assume-role
          role-session-name: github-actions-session
          aws-region: us-east-1

      - name: Get ECR Repository URI
        id: ecr_repo
        run: |
          REPO_URI=$(aws ecr describe-repositories --repository-names lambda-hello-world --region us-east-1 --query "repositories[0].repositoryUri" --output text)
          echo "ECR_REPO_URI=$REPO_URI" >> $GITHUB_ENV

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ env.ECR_REPO_URI }}

      - name: Build Docker Image
        run: docker build -t lambda-hello-world ./terraform/app

      - name: Tag Docker Image
        run: docker tag lambda-hello-world:latest ${{ env.ECR_REPO_URI }}:latest

      - name: Push Docker Image to ECR
        run: docker push ${{ env.ECR_REPO_URI }}:latest

      - name: Create or Update Lambda Function
        run: |
          aws lambda get-function --function-name hello-lambda --region us-east-1 || \
          aws lambda create-function \
            --function-name hello-lambda \
            --package-type Image \
            --code ImageUri=${{ env.ECR_REPO_URI }}:latest \
            --role arn:aws:iam::590183969845:role/<your-lambda-execution-role> \
            --timeout 10 \
            --memory-size 128 \
            --region us-east-1

          aws lambda update-function-code \
            --function-name hello-lambda \
            --image-uri "${{ env.ECR_REPO_URI }}:latest" \
            --region us-east-1