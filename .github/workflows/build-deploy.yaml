name: App & Infra Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]
      project_name:
        description: 'ECR repository name'
        required: true
        default: 'lambda-hello-world'
        type: string
      image_tag:
        description: 'Docker image tag (leave empty for auto-generated)'
        required: false
        default: ''
        type: string
      skip_build:
        description: 'Skip Docker build'
        required: false
        default: false
        type: boolean

env:
  AWS_REGION: ap-south-1
  AWS_ROLE_ARN: 'arn:aws:iam::436450225331:role/oidc-assume-role'

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_build != 'true'
    outputs:
      image_uri: ${{ steps.full_uri.outputs.image_uri }}
      image_tag: ${{ steps.gen_tag.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repo if not exists
        run: |
          aws ecr describe-repositories --repository-names ${{ github.event.inputs.project_name }} || \
          aws ecr create-repository --repository-name ${{ github.event.inputs.project_name }}

      - name: Generate Image Tag
        id: gen_tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "image_tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "image_tag=v1-${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ github.event.inputs.project_name }}:${{ steps.gen_tag.outputs.image_tag }} terraform/app
          docker tag ${{ github.event.inputs.project_name }}:${{ steps.gen_tag.outputs.image_tag }} \
            "${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ github.event.inputs.project_name }}:${{ steps.gen_tag.outputs.image_tag }}"
          docker push "${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ github.event.inputs.project_name }}:${{ steps.gen_tag.outputs.image_tag }}"

      - name: Output Full Image URI
        id: full_uri
        run: |
          IMAGE_URI="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ github.event.inputs.project_name }}:${{ steps.gen_tag.outputs.image_tag }}"
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy Terraform Infra
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init
        working-directory: terraform/envs/${{ github.event.inputs.environment }}
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform/envs/${{ github.event.inputs.environment }}
        run: |
          terraform apply -auto-approve \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="project_name=${{ github.event.inputs.project_name }}" \
            -var="environment=${{ github.event.inputs.environment }}" \
            -var="image_uri=${{ needs.build.outputs.image_uri }}"

      - name: Output API and Lambda Info
        working-directory: terraform/envs/${{ github.event.inputs.environment }}
        run: |
          echo "API: $(terraform output -raw api_endpoint 2>/dev/null || echo NotFound)"
          echo "Lambda: $(terraform output -raw lambda_function_name 2>/dev/null || echo NotFound)"
