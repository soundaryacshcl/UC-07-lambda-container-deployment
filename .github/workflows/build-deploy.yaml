name: Build and Deploy Lambda with API Gateway

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, staging, prod]
      project_name:
        description: "ECR repository name"
        required: true
        default: "lambda-hello-world"
        type: string
      image_tag:
        description: "Custom image tag (optional)"
        required: false
        default: ""
        type: string
      skip_build:
        description: "Skip Docker image build"
        required: false
        default: false
        type: boolean

env:
  AWS_REGION: ap-south-1
  AWS_ROLE_ARN: arn:aws:iam::436450225331:role/oidc-assume-role
  AWS_ACCOUNT_ID: 436450225331

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Create ECR Repo & Build Image
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.set.outputs.image_uri || steps.skip.outputs.image_uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR Repo (if not exists)
        run: |
          echo "Checking ECR repo: ${{ github.event.inputs.project_name }}"
          aws ecr describe-repositories --repository-names ${{ github.event.inputs.project_name }} || \
          aws ecr create-repository --repository-name ${{ github.event.inputs.project_name }}

      - name: Generate Image Tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=v1-${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi

      - name: Build & Push Docker Image
        if: github.event.inputs.skip_build != 'true'
        id: set
        run: |
          ECR_URI=${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ github.event.inputs.project_name }}
          IMAGE_TAG=${{ steps.tag.outputs.tag }}
          docker build -t "$ECR_URI:$IMAGE_TAG" terraform/app
          docker push "$ECR_URI:$IMAGE_TAG"
          echo "image_uri=$ECR_URI:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Set Skipped Image URI
        if: github.event.inputs.skip_build == 'true'
        id: skip
        run: |
          ECR_URI=${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ github.event.inputs.project_name }}
          IMAGE_TAG=${{ steps.tag.outputs.tag }}
          echo "image_uri=$ECR_URI:$IMAGE_TAG" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy Infra with Terraform
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init
        working-directory: terraform/envs/${{ github.event.inputs.environment }}
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform/envs/${{ github.event.inputs.environment }}
        run: |
          terraform apply -auto-approve \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="project_name=${{ github.event.inputs.project_name }}" \
            -var="environment=${{ github.event.inputs.environment }}" \
            -var="image_uri=${{ needs.build.outputs.image_uri }}"

      - name: Show Outputs
        working-directory: terraform/envs/${{ github.event.inputs.environment }}
        run: |
          echo "Lambda: $(terraform output -raw lambda_function_name 2>/dev/null || echo NotFound)"
          echo "API URL: $(terraform output -raw api_endpoint 2>/dev/null || echo NotFound)"
