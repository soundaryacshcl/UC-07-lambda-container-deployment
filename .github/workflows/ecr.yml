name: Ensure ECR Repository

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  ecr:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::590183969845:role/github-assume-role
          role-session-name: github-actions-session
          aws-region: us-east-1

      - name: Ensure ECR Repository Exists
        run: |
          aws ecr describe-repositories --repository-names lambda-hello-world --region us-east-1 || \
          aws ecr create-repository --repository-name lambda-hello-world --region us-east-1